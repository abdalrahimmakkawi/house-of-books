  <!-- Book spine center -->
  <path d="M48 30 Q50 29 52 30 L52 72 Q50 73 48 72 Z" fill="#065f46"/>
  
  <!-- Left page lines -->
  <line x1="26" y1="38" x2="44" y2="36" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="26" y1="44" x2="44" y2="42" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="26" y1="50" x2="44" y2="48" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="26" y1="56" x2="44" y2="55" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Right page lines -->
  <line x1="74" y1="38" x2="56" y2="36" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="74" y1="44" x2="56" y2="42" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="74" y1="50" x2="56" y2="48" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="74" y1="56" x2="56" y2="55" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Subtle shadow under book -->
